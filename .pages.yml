media:
  input: public/uploads
  output: /uploads
  path: ""

content:
  - name: site
    label: Site Settings
    type: file
    path: src/config/site.json
    format: json
    fields:
      - name: name
        label: Site Name
        type: string
        required: true
      - name: description
        label: Site Description
        type: text
        required: true
        options:
          rows: 3
      - name: titleSeparator
        label: Title Separator
        type: string
        required: true
      - name: footerContactCta
        label: Footer Contact CTA
        type: object
        required: true
        fields:
          - name: eyebrow
            label: Eyebrow
            type: string
          - name: headline
            label: Headline
            type: string
            required: true
          - name: body
            label: Body
            type: text
            options:
              rows: 3
          - name: email
            label: Contact Email
            type: string
            required: true
          - name: buttonLabel
            label: Button Label
            type: string
            required: true
          - name: buttonHref
            label: Button Link
            type: string
            help: "Optional. Leave empty to use mailto: with the contact email."

  - name: theme
    label: Theme
    type: file
    path: src/config/theme.json
    format: json
    fields:
      - name: headingFont
        label: Heading Font
        type: select
        required: true
        options:
          values: [bricolage, inter, system, helvetica, arial, georgia, times, garamond, palatino, trebuchet, verdana, tahoma, courier]
      - name: bodyFont
        label: Body Font
        type: select
        required: true
        options:
          values: [inter, bricolage, system, helvetica, arial, georgia, times, garamond, palatino, trebuchet, verdana, tahoma, courier]
      - name: bannerHeadlineSize
        label: Banner Headline Size
        type: select
        required: true
        options:
          values: [sm, md, lg, xl, 2xl]
      - name: background
        label: Background Color
        type: string
        required: true
      - name: foreground
        label: Foreground Color
        type: string
        required: true
      - name: card
        label: Card Color
        type: string
        required: true
      - name: cardForeground
        label: Card Foreground
        type: string
        required: true
      - name: popover
        label: Popover Color
        type: string
        required: true
      - name: popoverForeground
        label: Popover Foreground
        type: string
        required: true
      - name: primary
        label: Primary Color
        type: string
        required: true
      - name: primaryForeground
        label: Primary Foreground
        type: string
        required: true
      - name: secondary
        label: Secondary Color
        type: string
        required: true
      - name: secondaryForeground
        label: Secondary Foreground
        type: string
        required: true
      - name: muted
        label: Muted Color
        type: string
        required: true
      - name: mutedForeground
        label: Muted Foreground
        type: string
        required: true
      - name: accent
        label: Accent Color
        type: string
        required: true
      - name: accentForeground
        label: Accent Foreground
        type: string
        required: true
      - name: border
        label: Border Color
        type: string
        required: true
      - name: input
        label: Input Border
        type: string
        required: true
      - name: ring
        label: Focus Ring
        type: string
        required: true

  - name: sponsors
    label: Sponsors
    type: collection
    path: src/content/sponsors
    format: yaml-frontmatter
    subfolders: false
    filename: "{primary}.md"
    view:
      primary: name
      fields: [name, type, sortOrder, draft]
      sort: [type, sortOrder, name]
      default:
        sort: sortOrder
        order: asc
      search: [name, description, type]
    fields:
      - name: draft
        label: Draft
        type: boolean
        required: true
      - name: name
        label: Name
        type: string
        required: true
      - name: description
        label: Short Description
        type: text
        required: true
        options:
          rows: 3
      - name: type
        label: Sponsor Type
        type: select
        required: true
        options:
          values: [sponsors_donors, veterinary_partners]
      - name: sortOrder
        label: Sort Order
        type: number
        required: true
      - name: website
        label: Website
        type: string
        help: "Optional. Use a full URL like https://www.google.com/."
      - name: image
        label: Sponsor Image
        type: object
        required: true
        fields:
          - name: src
            label: Image
            type: image
            required: true
            options:
              path: sponsors
          - name: alt
            label: Alt Text
            type: string
            required: true

  - name: pages
    label: Pages
    type: collection
    path: src/content/pages
    format: yaml-frontmatter
    subfolders: true
    filename: "{primary}.md"
    view:
      layout: tree
      node:
        filename: index.md
        hideDirs: all
      primary: title
      fields: [title, navLabel, navOrder, showInNav, draft]
      sort: [navOrder, title]
      default:
        sort: navOrder
        order: asc
      search: [title, navLabel, description]
    fields:
      - name: draft
        label: Draft
        type: boolean
        required: true
      - name: title
        label: Title
        type: string
        required: true
      - name: description
        label: Description
        type: text
        options:
          rows: 3
      - name: navLabel
        label: Navigation Label
        type: string
      - name: showInNav
        label: Show In Navigation
        type: boolean
        required: true
      - name: navOrder
        label: Navigation Order
        type: number
        required: true
      - name: sections
        label: Page Sections
        type: block
        list: true
        required: true
        blockKey: type
        blocks:
          - name: hero
            label: Hero
            fields:
              - name: eyebrow
                label: Eyebrow
                type: string
              - name: headline
                label: Headline
                type: string
                required: true
              - name: body
                label: Body
                type: rich-text
                options:
                  path: pages
              - name: primaryCtaLabel
                label: Primary Button Label
                type: string
                help: "Button renders only when both label and link are filled in."
              - name: primaryCtaHref
                label: Primary Button Link
                type: string
                help: "Button renders only when both label and link are filled in."
              - name: primaryCtaStyle
                label: Primary Button Style
                type: select
                required: true
                help: "Uses your current theme colors."
                options:
                  values: [primary, outline, inverted, muted]
              - name: secondaryCtaLabel
                label: Secondary Button Label
                type: string
                help: "Button renders only when both label and link are filled in."
              - name: secondaryCtaHref
                label: Secondary Button Link
                type: string
                help: "Button renders only when both label and link are filled in."
              - name: secondaryCtaStyle
                label: Secondary Button Style
                type: select
                required: true
                help: "Uses your current theme colors."
                options:
                  values: [primary, outline, inverted, muted]
          - name: full_width_banner
            label: Full Width Banner
            fields:
              - name: eyebrow
                label: Eyebrow
                type: string
              - name: headline
                label: Headline
                type: string
                required: true
              - name: body
                label: Body
                type: rich-text
                options:
                  path: pages
              - name: image
                label: Background Image
                type: object
                required: true
                fields:
                  - name: src
                    label: Image
                    type: image
                    required: true
                    options:
                      path: pages
                  - name: alt
                    label: Alt Text
                    type: string
                    required: true
              - name: primaryCtaLabel
                label: Primary Button Label
                type: string
                help: "Button renders only when both label and link are filled in."
              - name: primaryCtaHref
                label: Primary Button Link
                type: string
                help: "Button renders only when both label and link are filled in."
              - name: primaryCtaStyle
                label: Primary Button Style
                type: select
                required: true
                help: "Uses your current theme colors."
                options:
                  values: [primary, outline, inverted, muted]
              - name: secondaryCtaLabel
                label: Secondary Button Label
                type: string
                help: "Button renders only when both label and link are filled in."
              - name: secondaryCtaHref
                label: Secondary Button Link
                type: string
                help: "Button renders only when both label and link are filled in."
              - name: secondaryCtaStyle
                label: Secondary Button Style
                type: select
                required: true
                help: "Uses your current theme colors."
                options:
                  values: [primary, outline, inverted, muted]
          - name: text
            label: Text Section
            fields:
              - name: title
                label: Title
                type: string
                required: true
              - name: body
                label: Body
                type: rich-text
                options:
                  path: pages
              - name: align
                label: Alignment
                type: select
                options:
                  values: [left, center]
          - name: image_text
            label: Image + Text
            fields:
              - name: title
                label: Title
                type: string
                required: true
              - name: body
                label: Body
                type: rich-text
                options:
                  path: pages
              - name: image
                label: Image
                type: object
                required: true
                fields:
                  - name: src
                    label: Image
                    type: image
                    required: true
                    options:
                      path: pages
                  - name: alt
                    label: Alt Text
                    type: string
                    required: true
              - name: imageSide
                label: Image Side
                type: select
                required: true
                options:
                  values: [left, right]
          - name: cta
            label: CTA
            fields:
              - name: title
                label: Title
                type: string
                required: true
              - name: body
                label: Body
                type: rich-text
                options:
                  path: pages
              - name: buttonLabel
                label: Button Label
                type: string
                required: true
                help: "CTA button renders only when both the label and link are filled in."
              - name: buttonHref
                label: Button Link
                type: string
                required: true
                help: "CTA button renders only when both the label and link are filled in."
              - name: buttonStyle
                label: Button Style
                type: select
                required: true
                help: "Uses your current theme colors. Choose the button look for this CTA."
                options:
                  values: [primary, outline, inverted, muted]
          - name: feature_grid
            label: Feature Grid
            fields:
              - name: title
                label: Title
                type: string
                required: true
              - name: body
                label: Body
                type: rich-text
                options:
                  path: pages
              - name: features
                label: Features
                type: object
                list: true
                fields:
                  - name: title
                    label: Title
                    type: string
                    required: true
                  - name: description
                    label: Description
                    type: text
                    required: true
                  - name: stepNumber
                    label: Step Number
                    type: number
                    help: "Optional. If provided, the card shows a numbered badge instead of an icon."
                  - name: icon
                    label: "Icon Name (bx:, uil:, fa-solid:, simple-icons:)"
                    type: string
                    help: "Optional. Use Iconify names from installed sets: https://icon-sets.iconify.design/bx/ , https://icon-sets.iconify.design/uil/ , https://icon-sets.iconify.design/simple-icons/ , or https://icon-sets.iconify.design/fa-solid/ . Ignored when Step Number is set."
          - name: logo_cloud
            label: Logo Cloud
            fields:
              - name: title
                label: Title
                type: string
                required: true
              - name: logos
                label: Logos
                type: object
                list: true
                required: true
                fields:
                  - name: icon
                    label: "Icon Name (bx:, uil:, fa-solid:, simple-icons:)"
                    type: string
                    required: true
                    help: "Use Iconify names from installed sets: https://icon-sets.iconify.design/bx/ , https://icon-sets.iconify.design/uil/ , https://icon-sets.iconify.design/simple-icons/ , or https://icon-sets.iconify.design/fa-solid/ ."
                  - name: label
                    label: Label
                    type: string
          - name: linked_content_list
            label: Linked Content List
            fields:
              - name: title
                label: Title
                type: string
                required: true
              - name: body
                label: Body
                type: rich-text
                options:
                  path: pages
              - name: items
                label: Items
                type: object
                list: true
                required: true
                fields:
                  - name: eyebrow
                    label: Eyebrow
                    type: string
                  - name: title
                    label: Title
                    type: string
                    required: true
                  - name: description
                    label: Description
                    type: text
                    required: true
                    options:
                      rows: 3
                  - name: image
                    label: Image
                    type: object
                    required: true
                    fields:
                      - name: src
                        label: Image
                        type: image
                        required: true
                        options:
                          path: pages
                      - name: alt
                        label: Alt Text
                        type: string
                        required: true
                  - name: linkLabel
                    label: Link Label
                    type: string
                    required: true
                  - name: linkHref
                    label: Link URL
                    type: string
                    required: true
          - name: image_carousel
            label: Image Carousel
            fields:
              - name: eyebrow
                label: Eyebrow
                type: string
              - name: title
                label: Title
                type: string
                required: true
              - name: body
                label: Body
                type: rich-text
                options:
                  path: pages
              - name: autoplay
                label: Autoplay
                type: boolean
                required: true
              - name: showNavigation
                label: Show Arrows
                type: boolean
                required: true
              - name: showPagination
                label: Show Pagination
                type: boolean
                required: true
              - name: mobileSlidesPerView
                label: Mobile Slides Per View
                type: number
                required: true
              - name: tabletSlidesPerView
                label: Tablet Slides Per View
                type: number
                required: true
              - name: desktopSlidesPerView
                label: Desktop Slides Per View
                type: number
                required: true
              - name: spaceBetween
                label: Space Between Slides
                type: number
                required: true
              - name: imageAspect
                label: Image Aspect Ratio
                type: select
                required: true
                options:
                  values: [square, landscape, portrait, wide]
              - name: slides
                label: Slides
                type: object
                list: true
                required: true
                fields:
                  - name: image
                    label: Image
                    type: object
                    required: true
                    fields:
                      - name: src
                        label: Image
                        type: image
                        required: true
                        options:
                          path: pages
                      - name: alt
                        label: Alt Text
                        type: string
                        required: true
                  - name: title
                    label: Slide Title
                    type: string
                  - name: description
                    label: Slide Description
                    type: text
                    options:
                      rows: 3
          - name: info_card_list
            label: Info Card List
            fields:
              - name: eyebrow
                label: Eyebrow
                type: string
              - name: title
                label: Title
                type: string
                required: true
              - name: body
                label: Intro Text
                type: rich-text
                options:
                  path: pages
              - name: items
                label: Cards
                type: object
                list: true
                required: true
                fields:
                  - name: eyebrow
                    label: Card Eyebrow
                    type: string
                  - name: title
                    label: Card Title
                    type: string
                    required: true
                  - name: body
                    label: Card Body
                    type: rich-text
                    options:
                      path: pages
                  - name: tone
                    label: Card Tone
                    type: select
                    required: true
                    options:
                      values: [sand, sky, sage, ink]
          - name: sponsor_list
            label: Sponsor List
            fields:
              - name: title
                label: Title
                type: string
                required: true
              - name: body
                label: Body
                type: rich-text
                options:
                  path: pages
              - name: types
                label: Sponsor Types
                type: select
                list: true
                help: "Optional. Leave empty to show all sponsor types."
                options:
                  values: [sponsors_donors, veterinary_partners]
          - name: team_members
            label: Team Members
            fields:
              - name: eyebrow
                label: Eyebrow
                type: string
              - name: title
                label: Title
                type: string
                required: true
              - name: body
                label: Body
                type: rich-text
                options:
                  path: pages

  - name: blog
    label: Blog Posts
    type: collection
    path: src/content/blog
    format: yaml-frontmatter
    subfolders: false
    filename: "{primary}.md"
    exclude:
      - kitchensink.mdx
    view:
      primary: title
      fields: [title, publishDate, category, author, draft]
      sort: [publishDate, title]
      default:
        sort: publishDate
        order: desc
      search: [title, snippet, category, author, tags]
    fields:
      - name: draft
        label: Draft
        type: boolean
        required: true
      - name: title
        label: Title
        type: string
        required: true
      - name: snippet
        label: Snippet
        type: text
        required: true
        options:
          rows: 3
      - name: image
        label: Hero Image
        type: object
        required: true
        fields:
          - name: src
            label: Image
            type: image
            required: true
            options:
              path: blog
          - name: alt
            label: Alt Text
            type: string
            required: true
      - name: publishDate
        label: Publish Date
        type: date
        required: true
      - name: author
        label: Author
        type: string
        required: true
      - name: category
        label: Category
        type: string
        required: true
      - name: tags
        label: Tags
        type: text
        list: true
        required: true
      - name: body
        label: Body
        type: rich-text
        required: true
        options:
          path: blog

  - name: team
    label: Team Members
    type: collection
    path: src/content/team
    format: yaml-frontmatter
    subfolders: false
    filename: "{primary}.md"
    view:
      primary: name
      fields: [name, publishDate, draft]
      sort: [publishDate, name]
      default:
        sort: publishDate
        order: desc
      search: [name, biography]
    fields:
      - name: draft
        label: Draft
        type: boolean
        required: true
      - name: name
        label: Name
        type: string
        required: true
      - name: biography
        label: Biography
        type: text
        required: true
        options:
          rows: 5
      - name: avatar
        label: Avatar
        type: object
        required: true
        fields:
          - name: src
            label: Image
            type: image
            required: true
            options:
              path: team
          - name: alt
            label: Alt Text
            type: string
            required: true
      - name: publishDate
        label: Publish Date
        type: date
        required: true
