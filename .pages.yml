media:
  input: public/uploads
  output: /uploads
  path: ""

content:
  - name: site
    label: Site Settings
    type: file
    path: src/config/site.json
    format: json
    fields:
      - name: name
        label: Site Name
        type: string
      - name: description
        label: Site Description
        type: text
        options:
          rows: 3
      - name: titleSeparator
        label: Title Separator
        type: string

  - name: theme
    label: Theme
    type: file
    path: src/config/theme.json
    format: json
    fields:
      - name: headingFont
        label: Heading Font
        type: select
        options:
          values: [bricolage, inter, system, helvetica, arial, georgia, times, garamond, palatino, trebuchet, verdana, tahoma, courier]
      - name: bodyFont
        label: Body Font
        type: select
        options:
          values: [inter, bricolage, system, helvetica, arial, georgia, times, garamond, palatino, trebuchet, verdana, tahoma, courier]
      - name: bannerHeadlineSize
        label: Banner Headline Size
        type: select
        options:
          values: [sm, md, lg, xl, 2xl]
      - name: background
        label: Background Color
        type: string
      - name: foreground
        label: Foreground Color
        type: string
      - name: card
        label: Card Color
        type: string
      - name: cardForeground
        label: Card Foreground
        type: string
      - name: popover
        label: Popover Color
        type: string
      - name: popoverForeground
        label: Popover Foreground
        type: string
      - name: primary
        label: Primary Color
        type: string
      - name: primaryForeground
        label: Primary Foreground
        type: string
      - name: secondary
        label: Secondary Color
        type: string
      - name: secondaryForeground
        label: Secondary Foreground
        type: string
      - name: muted
        label: Muted Color
        type: string
      - name: mutedForeground
        label: Muted Foreground
        type: string
      - name: accent
        label: Accent Color
        type: string
      - name: accentForeground
        label: Accent Foreground
        type: string
      - name: border
        label: Border Color
        type: string
      - name: input
        label: Input Border
        type: string
      - name: ring
        label: Focus Ring
        type: string

  - name: pages
    label: Pages
    type: collection
    path: src/content/pages
    format: yaml-frontmatter
    subfolders: true
    filename: "{primary}.md"
    view:
      layout: tree
      node:
        filename: index.md
        hideDirs: all
      primary: title
      fields: [title, navLabel, navOrder, showInNav, draft]
      sort: [navOrder, title]
      default:
        sort: navOrder
        order: asc
      search: [title, navLabel, description]
    fields:
      - name: draft
        label: Draft
        type: boolean
      - name: title
        label: Title
        type: string
      - name: description
        label: Description
        type: text
        options:
          rows: 3
      - name: navLabel
        label: Navigation Label
        type: string
      - name: showInNav
        label: Show In Navigation
        type: boolean
      - name: navOrder
        label: Navigation Order
        type: number
      - name: sections
        label: Page Sections
        type: block
        list: true
        blockKey: type
        blocks:
          - name: hero
            label: Hero
            fields:
              - name: eyebrow
                label: Eyebrow
                type: string
              - name: headline
                label: Headline
                type: string
              - name: body
                label: Body
                type: rich-text
                options:
                  path: pages
              - name: primaryCtaLabel
                label: Primary Button Label
                type: string
              - name: primaryCtaHref
                label: Primary Button Link
                type: string
              - name: secondaryCtaLabel
                label: Secondary Button Label
                type: string
              - name: secondaryCtaHref
                label: Secondary Button Link
                type: string
          - name: full_width_banner
            label: Full Width Banner
            fields:
              - name: eyebrow
                label: Eyebrow
                type: string
              - name: headline
                label: Headline
                type: string
              - name: body
                label: Body
                type: rich-text
                options:
                  path: pages
              - name: image
                label: Background Image
                type: object
                fields:
                  - name: src
                    label: Image
                    type: image
                    options:
                      path: pages
                  - name: alt
                    label: Alt Text
                    type: string
              - name: primaryCtaLabel
                label: Primary Button Label
                type: string
              - name: primaryCtaHref
                label: Primary Button Link
                type: string
              - name: secondaryCtaLabel
                label: Secondary Button Label
                type: string
              - name: secondaryCtaHref
                label: Secondary Button Link
                type: string
          - name: text
            label: Text Section
            fields:
              - name: title
                label: Title
                type: string
              - name: body
                label: Body
                type: rich-text
                options:
                  path: pages
              - name: align
                label: Alignment
                type: select
                options:
                  values: [left, center]
          - name: image_text
            label: Image + Text
            fields:
              - name: title
                label: Title
                type: string
              - name: body
                label: Body
                type: rich-text
                options:
                  path: pages
              - name: image
                label: Image
                type: object
                fields:
                  - name: src
                    label: Image
                    type: image
                    options:
                      path: pages
                  - name: alt
                    label: Alt Text
                    type: string
              - name: imageSide
                label: Image Side
                type: select
                options:
                  values: [left, right]
          - name: cta
            label: CTA
            fields:
              - name: title
                label: Title
                type: string
              - name: body
                label: Body
                type: rich-text
                options:
                  path: pages
              - name: buttonLabel
                label: Button Label
                type: string
              - name: buttonHref
                label: Button Link
                type: string
          - name: feature_grid
            label: Feature Grid
            fields:
              - name: title
                label: Title
                type: string
              - name: body
                label: Body
                type: rich-text
                options:
                  path: pages
              - name: features
                label: Features
                type: object
                list: true
                fields:
                  - name: title
                    label: Title
                    type: string
                  - name: description
                    label: Description
                    type: text
                  - name: stepNumber
                    label: Step Number
                    type: number
                    help: "Optional. If provided, the card shows a numbered badge instead of an icon."
                  - name: icon
                    label: Icon Name
                    type: string
                    help: "Optional. Use Iconify names like bx:cat, bxs:church, simple-icons:astro, or uil:home. Ignored when Step Number is set."
          - name: logo_cloud
            label: Logo Cloud
            fields:
              - name: title
                label: Title
                type: string
              - name: logos
                label: Logos
                type: object
                list: true
                fields:
                  - name: icon
                    label: Icon Name
                    type: string
                    help: "Use Iconify names like bx:cat, bxs:church, simple-icons:astro, or uil:home."
                  - name: label
                    label: Label
                    type: string

  - name: blog
    label: Blog Posts
    type: collection
    path: src/content/blog
    format: yaml-frontmatter
    subfolders: false
    filename: "{primary}.md"
    exclude:
      - kitchensink.mdx
    view:
      primary: title
      fields: [title, publishDate, category, author, draft]
      sort: [publishDate, title]
      default:
        sort: publishDate
        order: desc
      search: [title, snippet, category, author, tags]
    fields:
      - name: draft
        label: Draft
        type: boolean
      - name: title
        label: Title
        type: string
      - name: snippet
        label: Snippet
        type: text
        options:
          rows: 3
      - name: image
        label: Hero Image
        type: object
        fields:
          - name: src
            label: Image
            type: image
            options:
              path: blog
          - name: alt
            label: Alt Text
            type: string
      - name: publishDate
        label: Publish Date
        type: date
      - name: author
        label: Author
        type: string
      - name: category
        label: Category
        type: string
      - name: tags
        label: Tags
        type: text
        list: true
      - name: body
        label: Body
        type: rich-text
        options:
          path: blog

  - name: team
    label: Team Members
    type: collection
    path: src/content/team
    format: yaml-frontmatter
    subfolders: false
    filename: "{primary}.md"
    view:
      primary: name
      fields: [name, title, publishDate, draft]
      sort: [publishDate, name]
      default:
        sort: publishDate
        order: desc
      search: [name, title]
    fields:
      - name: draft
        label: Draft
        type: boolean
      - name: name
        label: Name
        type: string
      - name: title
        label: Job Title
        type: string
      - name: avatar
        label: Avatar
        type: object
        fields:
          - name: src
            label: Image
            type: image
            options:
              path: team
          - name: alt
            label: Alt Text
            type: string
      - name: publishDate
        label: Publish Date
        type: date
